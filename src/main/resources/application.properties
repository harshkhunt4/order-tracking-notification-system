spring.application.name=com.example.ordertracker

server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/ordertracker
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.springframework.security=TRACE
jwt.rsa-private-key=classpath:certs/privateKey.pem
jwt.rsa-public-key=classpath:certs/publicKey.pem

logging.level.org.springframework.kafka=WARN
logging.level.org.apache.kafka=WARN