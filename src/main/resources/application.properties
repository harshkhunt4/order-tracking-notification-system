spring.application.name=com.example.ordertracker

server.port=8080

#################
## Data Source ##
#################
spring.datasource.url=jdbc:mysql://localhost:3306/ordertracker
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

############
## JWT #####
############
jwt.rsa-private-key=classpath:certs/privateKey.pem
jwt.rsa-public-key=classpath:certs/publicKey.pem

############
## Logs ####
############
logging.level.org.springframework.security=TRACE

#############
## Redis ####
#############
spring.redis.host=localhost
spring.redis.port=6379